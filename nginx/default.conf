# Define the upstream server (Django Gunicorn)
upstream pulse_gateway {
    server pulse_django:8000;
}

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Handle Static Files
    # In production, Nginx serves these directly from a shared volume
    location /static/ {
        alias /app/static/;
    }

    # Handle Media Files (if you scrape images later)
    location /media/ {
        alias /app/media/;
    }

    # Proxy all other requests to the Django Gateway
    location / {
        proxy_pass http://pulse_gateway;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;

        # Standard timeouts for scraping-heavy apps
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}